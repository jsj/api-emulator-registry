name: Release provider packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: Provider package version to publish
        required: true
        type: string
      providers:
        description: Comma-separated provider slugs; leave blank to publish changed providers unless changed_only is false
        required: false
        default: ""
        type: string
      changed_only:
        description: When providers is blank, publish only package providers changed since changed_base/latest tag
        required: false
        default: true
        type: boolean
      changed_base:
        description: Optional git ref for changed-only detection; defaults to latest tag, then HEAD~1
        required: false
        default: ""
        type: string
      dry_run:
        description: Pack and publish with --dry-run
        required: true
        default: true
        type: boolean
      force:
        description: Attempt publish even when the version already exists
        required: false
        default: false
        type: boolean
      publish_concurrency:
        description: Number of provider packages to pack/publish in parallel; keep low to avoid npm rate limits
        required: false
        default: 2
        type: number

concurrency:
  group: ${{ github.workflow }}-${{ inputs.version }}-${{ inputs.providers || 'all' }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: Publish provider packages
    runs-on: ubuntu-latest
    environment: Release
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Publish providers
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          PROVIDER_VERSION: ${{ inputs.version }}
          PROVIDERS: ${{ inputs.providers }}
          CHANGED_ONLY: ${{ inputs.changed_only }}
          CHANGED_BASE: ${{ inputs.changed_base }}
          DRY_RUN: ${{ inputs.dry_run }}
          FORCE: ${{ inputs.force }}
          PUBLISH_CONCURRENCY: ${{ inputs.publish_concurrency }}
        run: |
          cleanup() {
            npm config delete //registry.npmjs.org/:_authToken >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          if [ "$DRY_RUN" != "true" ] && [ -n "${NPM_TOKEN:-}" ]; then
            npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
          fi
          node scripts/publish-provider-packages.mjs
